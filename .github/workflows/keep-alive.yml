name: RemunaIA Keep-Alive

on:
  schedule:
    - cron: '23 9 */4 * *'  # a cada 4 dias às 9h23 UTC
  workflow_dispatch:         # permite rodar manualmente

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "https://hyxgcqgnpsfofddmsodi.supabase.co/rest/v1/profiles?select=count&limit=1")
          echo "Status HTTP: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Aviso: resposta inesperada ($STATUS)"
            exit 1
          fi
          echo "Projeto ativo."
